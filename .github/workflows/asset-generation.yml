name: PM Lean Asset Generation

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source to process"
        required: true
        default: "fixture-live"
        type: choice
        options: ["pm", "fixture-live", "dummy"]
      series:
        description: "Optional call series slug"
        required: false
        type: string
      limit:
        description: "Optional call limit"
        required: false
        default: "25"
        type: string
      enable_dummy_pipeline:
        description: "Must be true for dummy source"
        required: false
        default: false
        type: boolean
      dispatch_forkcast_data:
        description: "Dispatch forkcast-data ingest after success"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "7,37 * * * *"

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      REQUESTED_SOURCE: ${{ inputs.source || vars.PM_LEAN_SCHEDULE_SOURCE || 'fixture-live' }}
      SHOULD_DISPATCH_FORKCAST_DATA: ${{ github.event_name == 'schedule' || inputs.dispatch_forkcast_data == true }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Restore accumulated fixture-live feed
        if: ${{ env.REQUESTED_SOURCE == 'fixture-live' }}
        run: |
          mkdir -p out
          if git ls-remote --exit-code --heads origin pm-lean-feed >/dev/null 2>&1; then
            git clone --depth 1 --branch pm-lean-feed "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" out
            rm -rf out/.git
          fi
      - name: Checkout upstream PM
        if: ${{ env.REQUESTED_SOURCE == 'pm' }}
        uses: actions/checkout@v6
        with:
          repository: ethereum/pm
          path: upstream-pm
      - name: Generate real PM artifacts
        if: ${{ env.REQUESTED_SOURCE == 'pm' }}
        run: npm run backfill -- --pm-root "$PM_ROOT" --out out --series "${{ inputs.series }}" --limit "${{ inputs.limit || '25' }}"
        env:
          PM_ROOT: upstream-pm
      - name: Generate fixture-live PM feed artifact
        if: ${{ env.REQUESTED_SOURCE == 'fixture-live' }}
        run: |
          ENABLE_PM_LEAN_FIXTURE_FEED=true npm run live-fixture -- --out out --cycle "$GITHUB_RUN_NUMBER"
          npm run derive -- --out out
      - name: Generate deterministic dummy artifacts
        if: ${{ env.REQUESTED_SOURCE == 'dummy' && inputs.enable_dummy_pipeline == true }}
        run: |
          ENABLE_DUMMY_PIPELINE=true npm run dummy -- --out out
          npm run derive -- --out out
      - name: Refuse accidental dummy mode
        if: ${{ env.REQUESTED_SOURCE == 'dummy' && inputs.enable_dummy_pipeline != true }}
        run: |
          echo "Dummy source requires enable_dummy_pipeline=true"
          exit 1
      - run: npm run verify
      - name: Publish pm-lean feed branch
        if: ${{ env.REQUESTED_SOURCE != 'dummy' }}
        run: |
          publish_dir="$(mktemp -d)"
          git init "$publish_dir"
          git -C "$publish_dir" remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$publish_dir" checkout --orphan pm-lean-feed
          cp -R out/. "$publish_dir"/
          git -C "$publish_dir" config user.name "github-actions[bot]"
          git -C "$publish_dir" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$publish_dir" add .
          if git -C "$publish_dir" diff --cached --quiet; then
            echo "No feed changes to publish"
          else
            git -C "$publish_dir" commit -m "Publish PM Lean feed run ${GITHUB_RUN_NUMBER}"
            git -C "$publish_dir" push origin HEAD:pm-lean-feed --force
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: pm-lean-output
          path: out
      - name: Dispatch forkcast-data
        if: ${{ env.REQUESTED_SOURCE != 'dummy' && env.SHOULD_DISPATCH_FORKCAST_DATA == 'true' }}
        run: npm run dispatch -- --out out --repo dionysuzx/forkcast-data --workflow data-pipeline.yml --feed-repo dionysuzx/pm-lean --feed-ref pm-lean-feed --feed-path catalog.json
        env:
          GITHUB_TOKEN: ${{ secrets.FORKCAST_DATA_DISPATCH_TOKEN }}
